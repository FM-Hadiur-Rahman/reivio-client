name: Deploy Reivio Frontend

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: |
          npm ci || (echo "npm ci failed, falling back to npm install" && npm install)

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS identity
        run: aws sts get-caller-identity

      - name: Deploy to S3 (assets immutable, index no-cache)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -e

          echo "Deploying to s3://$S3_BUCKET"

          # 1) Upload everything except index.html with long cache (for hashed files)
          aws s3 sync dist/ "s3://$S3_BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          # 2) Upload index.html with no-cache (so new deploy shows immediately)
          aws s3 cp dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

          echo "✅ S3 deploy done"

      - name: CloudFront invalidation (trim Distribution ID)
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e

          # IMPORTANT: trim newline/spaces from secret
          CF_ID="$(printf '%s' "$CF_DIST_ID" | tr -d '\r\n' | xargs)"
          echo "CloudFront Distribution ID: [$CF_ID]"

          # Invalidate index.html and optionally all (keeps it simple)
          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/index.html" "/*"

          echo "✅ CloudFront invalidation requested"
