name: Deploy Reivio Frontend

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1) Upload everything EXCEPT html with long cache
      - name: Deploy assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      # 2) Upload html with no-cache (so CF always revalidates)
      - name: Deploy HTML (no cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --metadata-directive REPLACE

      # 3) Invalidate only index.html (usually enough for SPA)
      - name: CloudFront invalidation (index.html)
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e
          CF_ID="$(printf '%s' "$CF_DIST_ID" | tr -d '\r\n' | xargs)"
          echo "CloudFront Distribution ID: [$CF_ID]"

          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/index.html"

          echo "✅ CloudFront invalidation requested"
